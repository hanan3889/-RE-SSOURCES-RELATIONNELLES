<div class="min-h-screen bg-gradient-to-br from-blue-600 via-purple-600 to-pink-500 flex items-center justify-center py-12 px-4">
  <!-- Background Pattern -->
  <div class="absolute inset-0 opacity-10">
    <div class="absolute top-0 left-0 w-96 h-96 bg-white rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-white rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Connexion</h1>
        <p class="text-gray-600">Accédez à votre compte Ressources Relationnelles</p>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Email Field -->
        <div class="mb-6">
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
            Adresse email
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="vous@example.com"
            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('email')"
          />
          <p *ngIf="isFieldInvalid('email')" class="text-red-500 text-sm mt-1">
            Veuillez entrer une adresse email valide
          </p>
        </div>

        <!-- Password Field -->
        <div class="mb-6">
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
            Mot de passe
          </label>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('password')"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="text-sm text-blue-600 hover:text-blue-700 mt-2"
          >
            {{ showPassword ? 'Masquer' : 'Afficher' }}
          </button>
          <p *ngIf="isFieldInvalid('password')" class="text-red-500 text-sm mt-1">
            Le mot de passe est requis
          </p>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center mb-6">
          <input
            id="remember"
            type="checkbox"
            formControlName="rememberMe"
            class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500"
          />
          <label for="remember" class="ml-2 text-sm text-gray-700">
            Rester connecté
          </label>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loginForm.invalid || isSubmitting"
          class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:shadow-lg transform hover:scale-105 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isSubmitting ? 'Connexion...' : 'Se connecter' }}
        </button>

        <!-- Error Message -->
        <p *ngIf="errorMessage" class="text-red-500 text-sm text-center mt-4">
          {{ errorMessage }}
        </p>
      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">ou</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="text-center space-y-3">
        <p class="text-gray-600">
          Pas encore de compte ?
          <a routerLink="/auth/register" class="text-blue-600 font-semibold hover:text-blue-700">
            S'inscrire
          </a>
        </p>
        <a href="#" class="text-sm text-blue-600 hover:text-blue-700">
          Mot de passe oublié ?
        </a>
      </div>
    </div>

    <!-- Back to Home -->
    <div class="text-center mt-6">
      <a routerLink="/home" class="text-white hover:text-gray-100 transition-colors">
        ← Retour à l'accueil
      </a>
    </div>
  </div>
</div>
