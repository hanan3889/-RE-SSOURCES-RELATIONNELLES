<div class="min-h-screen bg-[#000091] flex items-center justify-center py-12 px-4">
  <!-- Background Pattern -->
  <div class="absolute inset-0 opacity-10">
    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-400 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-400 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Créer un compte</h1>
        <p class="text-gray-600">Rejoignez notre communauté dès aujourd'hui</p>
      </div>

      <!-- Form -->
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <!-- Nom / Prénom -->
        <div class="flex gap-3 mb-6">
          <div class="flex-1">
            <label for="nom" class="block text-sm font-semibold text-gray-700 mb-2">Nom</label>
            <input
              id="nom"
              type="text"
              formControlName="nom"
              placeholder="Dupont"
              class="w-full px-4 py-3 bg-white text-gray-900 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors"
              [class.border-red-500]="isFieldInvalid('nom')"
            />
            <p *ngIf="isFieldInvalid('nom')" class="text-red-500 text-sm mt-1">Requis</p>
          </div>
          <div class="flex-1">
            <label for="prenom" class="block text-sm font-semibold text-gray-700 mb-2">Prénom</label>
            <input
              id="prenom"
              type="text"
              formControlName="prenom"
              placeholder="Marie"
              class="w-full px-4 py-3 bg-white text-gray-900 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors"
              [class.border-red-500]="isFieldInvalid('prenom')"
            />
            <p *ngIf="isFieldInvalid('prenom')" class="text-red-500 text-sm mt-1">Requis</p>
          </div>
        </div>

        <!-- Email Field -->
        <div class="mb-6">
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
            Adresse email
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="vous@example.com"
            class="w-full px-4 py-3 bg-white text-gray-900 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('email')"
          />
          <p *ngIf="isFieldInvalid('email')" class="text-red-500 text-sm mt-1">
            Veuillez entrer une adresse email valide
          </p>
        </div>

        <!-- Password Field -->
        <div class="mb-6">
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
            Mot de passe
          </label>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Minimum 8 caractères"
            class="w-full px-4 py-3 bg-white text-gray-900 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('password')"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="text-sm text-blue-600 hover:text-blue-700 mt-2"
          >
            {{ showPassword ? 'Masquer' : 'Afficher' }}
          </button>
          <p *ngIf="isFieldInvalid('password')" class="text-red-500 text-sm mt-1">
            Le mot de passe doit contenir au minimum 8 caractères
          </p>
        </div>

        <!-- Confirm Password Field -->
        <div class="mb-6">
          <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-2">
            Confirmer le mot de passe
          </label>
          <input
            id="confirmPassword"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Re-entrez votre mot de passe"
            class="w-full px-4 py-3 bg-white text-gray-900 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('confirmPassword')"
          />
          <p *ngIf="isFieldInvalid('confirmPassword')" class="text-red-500 text-sm mt-1">
            Les mots de passe ne correspondent pas
          </p>
        </div>

        <!-- Terms Checkbox -->
        <div class="flex items-start mb-6">
          <input
            id="terms"
            type="checkbox"
            formControlName="acceptTerms"
            class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 mt-1"
          />
          <label for="terms" class="ml-2 text-sm text-gray-700">
            J'accepte les
            <a href="#" class="text-blue-600 hover:text-blue-700 font-semibold">conditions d'utilisation</a>
            et la
            <a href="#" class="text-blue-600 hover:text-blue-700 font-semibold">politique de confidentialité</a>
          </label>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="registerForm.invalid || isSubmitting"
          class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:shadow-lg transform hover:scale-105 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isSubmitting ? 'Création en cours...' : 'Créer un compte' }}
        </button>

        <!-- Error Message -->
        <p *ngIf="errorMessage" class="text-red-500 text-sm text-center mt-4">
          {{ errorMessage }}
        </p>
      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-[#000091] text-white">ou</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="text-center">
        <p class="text-gray-600">
          Déjà inscrit ?
          <a routerLink="/auth/login" class="text-blue-600 font-semibold hover:text-blue-700">
            Se connecter
          </a>
        </p>
      </div>
    </div>

    <!-- Back to Home -->
    <div class="text-center mt-6">
      <a routerLink="/home" class="text-white hover:text-gray-100 transition-colors">
        ← Retour à l'accueil
      </a>
    </div>
  </div>
</div>
